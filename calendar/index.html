<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日程月历 v16</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f2ed;--surface:#fffdfa;--text:#2c2b28;--text-muted:#8b8680;
  --text-dim:#b8b3ab;--border:#e8e4dc;--border-light:#f0ece5;
  --shadow:0 2px 8px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03);
  --shadow-lg:0 8px 30px rgba(0,0,0,.08);
  --radius:14px;--radius-sm:8px;--radius-xs:5px;
  --accent:#5b5fc7;--accent-light:#eef0ff;--accent-hover:#4a4eb5;
  --today-bg:#5b5fc7;--danger:#e5484d;--weekend-bg:rgba(0,0,0,.018);
  --font:"PingFang SC","Microsoft YaHei","Hiragino Sans GB","Segoe UI",sans-serif;
  --transition:0.18s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:1100px;margin:0 auto;padding:24px 20px 60px;position:relative}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.header-group{display:flex;align-items:center;gap:8px}
.month-title{font-size:1.35rem;font-weight:700;letter-spacing:-0.01em;min-width:140px;user-select:none;color:var(--text)}
.nav-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);color:var(--text-muted)}
.nav-btn:hover{background:#f5f2ed;border-color:#d5d0c8;color:var(--text)}
.today-btn{padding:7px 15px;border-radius:20px;border:1.5px solid var(--accent);background:var(--surface);color:var(--accent);cursor:pointer;font-size:.82rem;font-weight:600;transition:var(--transition);margin-left:4px}
.today-btn:hover{background:var(--accent-light)}
.action-btn{padding:8px 17px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:.8rem;font-weight:500;transition:var(--transition);display:inline-flex;align-items:center;gap:5px;color:var(--text);font-family:var(--font)}
.action-btn:hover{background:#faf8f5;border-color:#d5d0c8}
.action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.action-btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.action-btn.warn{color:var(--danger);border-color:var(--danger)}
.action-btn.warn:hover{background:#fef2f2}

/* Main wrap dims when sidebar open */
.main-wrap{transition:opacity .25s ease}
.main-wrap.dimmed{opacity:.45;pointer-events:none}

/* Scrim - captures clicks to close sidebar */
.scrim{position:fixed;inset:0;z-index:49;display:none}
.scrim.show{display:block}

.calendar-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.weekday{padding:14px 8px;text-align:center;font-size:.75rem;font-weight:600;color:var(--text-muted);letter-spacing:.03em}
.weekday.wknd{color:var(--text-dim)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(100px,100px)}
.cell{overflow:hidden;border-bottom:1px solid var(--border-light);border-right:1px solid var(--border-light);padding:6px 7px 4px;cursor:pointer;transition:background var(--transition);position:relative;min-height:100px}
.cell:nth-child(7n){border-right:none}
.cell:hover{background:rgba(0,0,0,.015)}
.cell.wknd{background:var(--weekend-bg)}
.cell.other-month{opacity:.3}
.cell.today{box-shadow:inset 0 0 0 2px var(--today-bg);border-radius:2px}
.cell.selected{background:rgba(91,95,199,.06)}
.date-num{font-size:.82rem;font-weight:600;display:inline-flex;align-items:center;justify-content:center;min-width:27px;height:27px;border-radius:14px;margin-bottom:3px;padding:0 2px;color:var(--text)}
.cell.today .date-num{background:var(--today-bg);color:#fff}
.cell.other-month .date-num{color:var(--text-dim)}

/* === INBOX === */
.inbox-section{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:20px;overflow:hidden}
.inbox-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-light)}
.inbox-header h3{font-size:.95rem;font-weight:700;color:var(--text);margin:0}
.inbox-count{font-size:.75rem;color:var(--text-muted);background:var(--bg);padding:3px 10px;border-radius:12px}
.inbox-list{padding:8px 12px;min-height:60px}
.inbox-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);border:1px solid transparent}
.inbox-item:hover{background:var(--bg);border-color:var(--border)}
.inbox-item.done{opacity:.4;text-decoration:line-through}
.inbox-item .inbox-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.inbox-item .inbox-title{flex:1;font-size:.82rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-item .inbox-hint{font-size:.7rem;color:var(--text-dim);flex-shrink:0;opacity:0;transition:opacity .2s}
.inbox-item:hover .inbox-hint{opacity:1}
.inbox-empty{text-align:center;padding:20px;color:var(--text-dim);font-size:.8rem}
.inbox-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none;align-items:center;justify-content:center}
.inbox-picker-overlay.show{display:flex}
.inbox-picker{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:20px 24px;text-align:center;min-width:280px}
.inbox-picker h4{margin-bottom:14px;font-size:.9rem}
.inbox-picker input[type=date]{margin-bottom:14px;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;width:100%}
.inbox-picker .picker-actions{display:flex;gap:8px;justify-content:center}
.form-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;background:var(--surface);color:var(--text);resize:vertical;min-height:60px}
.sidebar-task-desc{font-size:.72rem;color:var(--text-muted);margin-top:4px;line-height:1.4;white-space:pre-wrap}

/* === TASK PILLS === */
.task-pill{font-size:.7rem;padding:2px 6px 2px 5px;border-radius:var(--radius-xs);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;line-height:1.45;transition:var(--transition)}
.task-pill:hover{filter:brightness(.92)}
.task-pill.done{text-decoration:line-through;opacity:.4}
.task-pill .pill-check{width:14px;height:14px;border-radius:50%;border:1.5px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;transition:var(--transition);color:transparent;cursor:pointer;background:rgba(255,255,255,.5)}
.task-pill .pill-check:hover{border-color:var(--accent)}
.task-pill.done .pill-check{background:#10b981;border-color:#10b981;color:#fff}
.task-pill .pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Single-day: left border */
.task-pill.single{border-left:3px solid transparent}

/* Multi-day: bracket visual [start ... end] */
.task-pill.multi{border-left:3px solid transparent;border-right:3px solid transparent}
.task-pill.multi.multi-start{border-left-width:4px}
.task-pill.multi.multi-end{border-right-width:4px}
.task-pill.multi.multi-both{border-left-width:4px;border-right-width:4px}

.more-badge{font-size:.62rem;color:#fff;background:var(--accent);padding:1px 5px;border-radius:8px;cursor:pointer;font-weight:600;display:inline-block;vertical-align:middle;margin-left:2px;transition:var(--transition);box-shadow:0 0 0 1.5px rgba(255,255,255,.45)}.more-badge:hover{background:var(--accent-hover);transform:scale(1.05)}


/* Day sidebar */
.day-sidebar{position:fixed;top:0;right:0;width:340px;height:100vh;background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:50;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;overflow:hidden}
.day-sidebar.open{transform:translateX(0)}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-date{font-size:1.05rem;font-weight:700}
.sidebar-close{width:30px;height:30px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:var(--transition)}
.sidebar-close:hover{background:rgba(0,0,0,.05);color:var(--text)}
.sidebar-tasks{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-task{padding:12px 20px;display:flex;align-items:flex-start;gap:10px;transition:background var(--transition);border-bottom:1px solid var(--border-light);cursor:pointer}
.sidebar-task:hover{background:rgba(0,0,0,.012)}
.sidebar-task.done .sidebar-task-title{text-decoration:line-through;opacity:.4}
.sidebar-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #d0cbc3;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;margin-top:1px;transition:var(--transition);color:transparent}
.sidebar-check:hover{border-color:var(--accent)}
.sidebar-task.done .sidebar-check{background:#10b981;border-color:#10b981;color:#fff}
.sidebar-task-body{flex:1;min-width:0}
.sidebar-task-title{font-size:.84rem;font-weight:500;word-break:break-word}
.sidebar-task-meta{font-size:.7rem;color:var(--text-dim);margin-top:2px}
.sidebar-cat-tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.65rem;color:#fff;margin-right:4px}
.sidebar-empty{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:.85rem}
.sidebar-footer{padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:90%;max-width:460px;max-height:90vh;overflow-y:auto;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1.05rem;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);color:var(--text-muted)}
.modal-close:hover{background:rgba(0,0,0,.05);color:var(--text)}
.modal-body{padding:18px 22px 22px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.78rem;font-weight:600;margin-bottom:5px;color:var(--text-muted)}
.form-input,.form-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.84rem;font-family:var(--font);transition:var(--transition);background:var(--surface);color:var(--text);outline:none}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.form-row{display:flex;gap:10px}
.form-row>*{flex:1}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--border-light)}
.cat-grid{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.cat-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);transition:var(--transition)}
.cat-row:hover{background:rgba(0,0,0,.02)}
.cat-swatch{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;position:relative;overflow:hidden}
.cat-swatch input{position:absolute;inset:0;opacity:0;cursor:pointer}
.cat-name-input{flex:1;padding:6px 10px;border:1.5px solid transparent;border-radius:var(--radius-xs);font-size:.8rem;font-family:var(--font);background:transparent;transition:var(--transition);outline:none}
.cat-name-input:hover{border-color:var(--border)}
.cat-name-input:focus{border-color:var(--accent);background:var(--surface)}
.cat-count{font-size:.7rem;color:var(--text-dim);min-width:28px;text-align:right}
.cat-del-btn{width:26px;height:26px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:.75rem;color:var(--text-dim);transition:var(--transition);display:flex;align-items:center;justify-content:center}
.cat-del-btn:hover{background:#fef2f2;color:var(--danger)}
.cat-add-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:.78rem;color:var(--text-muted);font-family:var(--font);margin-top:6px;transition:var(--transition);width:100%;justify-content:center}
.cat-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#2c2b28;color:#faf8f5;padding:10px 22px;border-radius:22px;font-size:.8rem;font-weight:500;opacity:0;transition:all .3s ease;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* AI input */
.ai-fab{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(59,66,112,.35);transition:var(--transition);z-index:40}
.ai-fab:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(59,66,112,.45)}
.ai-modal-overlay{position:fixed;inset:0;z-index:110;display:flex;align-items:center;justify-content:center;background:rgba(45,42,38,.12);backdrop-filter:blur(3px)}
.ai-modal{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:460px;max-width:92vw;animation:modalIn .25s cubic-bezier(.4,0,.2,1)}
.ai-modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-light)}
.ai-modal-header h3{font-size:1.05rem;font-weight:700;font-family:var(--font-heading)}
.ai-modal-body{padding:20px 22px}
.ai-modal-body textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.88rem;font-family:var(--font-body);resize:vertical;min-height:80px;outline:none;transition:var(--transition);background:var(--card);color:var(--text);line-height:1.6}
.ai-modal-body textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,66,112,.08)}
.ai-modal-body .ai-hint{font-size:.72rem;color:var(--text-dim);margin-top:8px}
.ai-preview{margin-top:14px;padding:14px;background:var(--accent-light);border-radius:var(--radius-sm);display:none}
.ai-preview.show{display:block}
.ai-preview-item{font-size:.82rem;margin-bottom:6px;display:flex;gap:8px}
.ai-preview-item .ai-label{color:var(--text-muted);min-width:48px;font-weight:600}
.ai-preview-item .ai-value{color:var(--text)}
.ai-loading{text-align:center;padding:16px;color:var(--text-muted);font-size:.85rem;display:none}
.ai-loading.show{display:block}

@media(max-width:768px){
  .app{padding:8px 4px 50px}
  .header{margin-bottom:12px;gap:6px;flex-wrap:wrap}
  .header-group{gap:4px}
  .month-title{font-size:1rem;min-width:auto;letter-spacing:0}
  .nav-btn{width:30px;height:30px;font-size:.85rem}
  .today-btn{padding:5px 10px;font-size:.7rem}
  .action-btn{padding:5px 10px;font-size:.68rem;gap:3px}
  .calendar-wrap{border-radius:8px}
  .weekday{font-size:.58rem;padding:8px 2px;letter-spacing:0}
  .grid{grid-auto-rows:minmax(55px,auto)}
  .cell{min-height:55px;padding:3px 2px 2px;overflow:hidden}
  .date-num{font-size:.65rem;min-width:20px;height:20px;border-radius:10px;padding:0 2px;margin-bottom:1px}
  /* Mobile: show only dots, hide text */
  .task-pill{font-size:.55rem;padding:1px 2px;margin-bottom:1px;gap:2px;border-left-width:2px!important}
  .task-pill .pill-dot{width:5px;height:5px;flex-shrink:0}
  .task-pill .pill-check{display:none}
  .task-pill span:not(.pill-dot):not(.pill-check){overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .more-badge{font-size:.5rem;padding:1px 4px;border-radius:6px;margin-left:1px}
  /* AI FAB */
  .ai-fab{width:42px;height:42px;bottom:16px;right:12px;font-size:1.1rem}
  .ai-modal{width:96vw;max-height:90vh}
  /* Sidebar full screen */
  .day-sidebar{width:100%;max-width:100%}
  .sidebar-header{padding:14px 16px}
  .sidebar-tasks{padding:10px 14px}
  .sidebar-footer{padding:10px 14px}
  /* Modal */
  .modal{width:96vw;max-height:90vh}
  .modal-body{padding:14px 16px;gap:10px}
  .modal-header{padding:14px 16px}
  .modal-footer{padding:10px 16px}
  /* Inbox */
  .inbox-header{padding:12px 14px}
  .inbox-item{padding:8px 6px;gap:6px}
  .inbox-item .inbox-title{font-size:.76rem}
  .inbox-list{padding:6px 8px}
  /* Legend */
  .cat-legend{font-size:.68rem;gap:4px 10px;padding:6px 10px 2px}
}

.inbox-add-btn{padding:6px 14px;border-radius:18px;border:1.5px dashed var(--border);background:transparent;color:var(--accent);cursor:pointer;font-size:.78rem;font-weight:600;transition:var(--transition);white-space:nowrap}
.inbox-add-btn:hover{background:var(--accent-light);border-color:var(--accent)}
/* === CATEGORY LEGEND === */
.cat-legend{display:flex;flex-wrap:wrap;gap:6px 14px;padding:6px 12px 2px;font-size:.75rem}
.cat-legend-item{display:flex;align-items:center;gap:5px;color:var(--text-muted);white-space:nowrap}
.cat-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

</style>
</head>
<body>
<div class="app">
  <div class="main-wrap" id="mainWrap">
    <div class="header">
      <div class="header-group">
        <button class="nav-btn" title="上一月" onclick="prevMonth()">&#9666;</button>
        <span class="month-title" id="monthTitle"></span>
        <button class="nav-btn" title="下一月" onclick="nextMonth()">&#9656;</button>
        <button class="today-btn" onclick="goToday()">今天</button>
      </div>
      <div class="header-group">
        <button class="action-btn" onclick="openCatModal()">分类</button>
        <button class="action-btn primary" onclick="openAddModal(selectedDate||todayStr())">+ 添加</button>
        
        <button class="action-btn" onclick="exportJSON()">导出</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()">导入</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      </div>
    </div>
    <div class="calendar-wrap">
      <div class="weekdays" id="weekdayRow"></div>
      <div class="grid" id="calendarGrid"></div>
    </div>
    <div class="inbox-section" id="inboxSection">
      <div class="inbox-header"><h3>📥 待办事项</h3><span class="inbox-count" id="inboxCount">0 项</span><button class="inbox-add-btn" onclick="openInboxAddTask()" title="添加待办任务">+ 添加任务</button></div>
      <div class="cat-legend" id="catLegend"></div>
      <div class="inbox-list" id="inboxList"></div>
    </div>
  </div>
  <div class="scrim" id="scrim" onclick="closeSidebar()"></div>
  <div class="day-sidebar" id="daySidebar" onclick="if(event.target===this)closeSidebar()">
    <div class="sidebar-header">
      <span class="sidebar-date" id="sidebarDate"></span>
      <button class="sidebar-close" onclick="closeSidebar()">&times;</button>
    </div>
    <div class="sidebar-tasks" id="sidebarTasks"></div>
    <div class="sidebar-footer">
      <button class="action-btn primary" id="sidebarAddBtn" style="width:100%;justify-content:center" onclick="sidebarAddTask()">+ 添加任务</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="taskModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">添加任务</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">任务名称</label><input class="form-input" id="taskTitle" placeholder="输入任务名称"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">开始日期</label><input class="form-input" type="date" id="taskDate"></div>
        <div class="form-group"><label class="form-label">结束日期 <span style="font-weight:400;color:var(--text-dim)">(跨天)</span></label><input class="form-input" type="date" id="taskEndDate"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">时间</label><input class="form-input" type="time" id="taskTime"></div>

function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayYearMonth(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function parseAppMonth(){
  if(appData.currentMonth){ var p=appData.currentMonth.split('-'); currentYear=parseInt(p[0]); currentMonth=parseInt(p[1]); }
  else{ var d=new Date(); currentYear=d.getFullYear(); currentMonth=d.getMonth()+1; }
}

function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function firstDow(y,m){ var d=new Date(y,m-1,1).getDay(); return d===0?6:d-1; }
function getCategory(id){ return appData.categories.find(function(c){return c.id===id;}) || appData.categories[0]; }

function lightenColor(hex, alpha){
  alpha = alpha || 0.18;
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

// ===== UNIFIED CELL-FLOW RENDERING =====
function renderCalendar(){
  var y=currentYear, m=currentMonth;
  document.getElementById('monthTitle').textContent = y+'年'+m+'月';
  appData.currentMonth = y+'-'+String(m).padStart(2,'0');
  saveData();
  var totalDays = daysInMonth(y,m), startDow = firstDow(y,m);
  var prevMonthDays = daysInMonth(y, m-1||12), today = todayStr();

  var weekdayNames = ['一','二','三','四','五','六','日'];
  var wdHTML = '';
  for(var i=0;i<7;i++){ wdHTML += '<div class="weekday'+(i>=5?' wknd':'')+'">'+weekdayNames[i]+'</div>'; }
  document.getElementById('weekdayRow').innerHTML = wdHTML;

  // Build unified task map: all tasks covering each date
  var tasksByDate = {};
  var monthStart = y+'-'+String(m).padStart(2,'0')+'-01';
  var monthEnd = y+'-'+String(m).padStart(2,'0')+'-'+String(totalDays).padStart(2,'0');

  appData.tasks.forEach(function(t){
    if(t.endDate && t.endDate !== t.date){
      var effStart = t.date < monthStart ? monthStart : t.date;
      var effEnd = t.endDate > monthEnd ? monthEnd : t.endDate;
      if(effStart > effEnd) return;
      var sp = effStart.split('-'), ep = effEnd.split('-');
      var cur = new Date(parseInt(sp[0]), parseInt(sp[1])-1, parseInt(sp[2]));
      var end = new Date(parseInt(ep[0]), parseInt(ep[1])-1, parseInt(ep[2]));
      while(cur <= end){
        var ds = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
        if(!tasksByDate[ds]) tasksByDate[ds] = [];
        tasksByDate[ds].push(t);
        cur.setDate(cur.getDate()+1);
      }
    } else {
      if(!tasksByDate[t.date]) tasksByDate[t.date] = [];
      tasksByDate[t.date].push(t);
    }
  });

  var totalCells = startDow + totalDays, rows = Math.ceil(totalCells/7), totalSlots = rows * 7;
  var gridHTML = '';

  for(var i=0;i<totalSlots;i++){
    var dayNum = i - startDow + 1;
    var isCurrentMonth = dayNum>=1 && dayNum<=totalDays;
    var isWeekend = (i%7)>=5;
    var dateStr, displayDay;
    if(isCurrentMonth){ dateStr = y+'-'+String(m).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0'); displayDay = dayNum; }
    else if(dayNum<=0){ var pm = m-1||12, py = pm===12?y-1:y; var pd = prevMonthDays+dayNum; dateStr = py+'-'+String(pm).padStart(2,'0')+'-'+String(pd).padStart(2,'0'); displayDay = pd; }
    else{ var nm = m+1>12?1:m+1, ny = nm===1?y+1:y; var nd = dayNum-totalDays; dateStr = ny+'-'+String(nm).padStart(2,'0')+'-'+String(nd).padStart(2,'0'); displayDay = nd; }
    var isToday = dateStr===today, isSel = dateStr===selectedDate;
    var classes = ['cell']; if(isWeekend) classes.push('wknd'); if(!isCurrentMonth) classes.push('other-month'); if(isToday) classes.push('today'); if(isSel) classes.push('selected');

    var allTasks = tasksByDate[dateStr] || [];
    // Sort: multi-day first, then by time
    allTasks.sort(function(a,b){
      var aM = (a.endDate && a.endDate!==a.date) ? 0 : 1;
      var bM = (b.endDate && b.endDate!==b.date) ? 0 : 1;
      if(aM !== bM) return aM - bM;
      return (a.time||'') > (b.time||'') ? 1 : -1;
    });

    var maxShow = 3;
    var taskHTML = '';
    allTasks.slice(0, maxShow).forEach(function(t){
      var cat = getCategory(t.category);
      var isMulti = t.endDate && t.endDate !== t.date;

      if(isMulti){
        // Determine bracket position
        var atStart = (dateStr === t.date);
        var atEnd = (dateStr === t.endDate);
        var segCls = '';
        if(atStart && atEnd) segCls = ' multi-both';
        else if(atStart) segCls = ' multi-start';
        else if(atEnd) segCls = ' multi-end';
        // middle days get no extra class (no border)

        var cls = 'task-pill multi' + segCls;
        if(t.done) cls += ' done';

        // Build inline style: only set border colors for start/end
        var mStyle = 'background:'+lightenColor(cat.color);
        if(atStart) mStyle += ';border-left-color:'+cat.color;
        if(atEnd) mStyle += ';border-right-color:'+cat.color;
        taskHTML += '<div class="'+cls+'" style="'+mStyle+'" title="'+escAttr(t.title)+' ('+formatShortDate(t.date)+'-'+formatShortDate(t.endDate)+')">';
        taskHTML += '<span class="pill-check" onclick="event.stopPropagation();toggleDone(\''+t.id+'\')">&#10003;</span>';
        taskHTML += '<span class="pill-dot" style="background:'+cat.color+'"></span>';
        // Show range hint on start/end
        var label = '';
        if(atStart && atEnd) label = '';
        else if(atStart) label = ' '+formatShortDate(t.date);
        else if(atEnd) label = ' '+formatShortDate(t.endDate);
        taskHTML += '<span onclick="event.stopPropagation();openEditModal(\''+t.id+'\')">'+escHtml(t.title)+'</span>';
        taskHTML += '<span style="font-size:.6rem;opacity:.6;flex-shrink:0;margin-left:2px">'+label+'</span>';
        taskHTML += '</div>';
      } else {
        var cls = 'task-pill single';
        if(t.done) cls += ' done';
        taskHTML += '<div class="'+cls+'" style="background:'+lightenColor(cat.color)+';border-left-color:'+cat.color+'" title="'+escAttr(t.title)+'">';
        taskHTML += '<span class="pill-check" onclick="event.stopPropagation();toggleDone(\''+t.id+'\')">&#10003;</span>';
        taskHTML += '<span class="pill-dot" style="background:'+cat.color+'"></span>';
        taskHTML += '<span onclick="event.stopPropagation();openEditModal(\''+t.id+'\')">'+escHtml((t.time?t.time+' ':'')+t.title)+'</span>';
        taskHTML += '</div>';
      }
    });
        var moreHTML = '';
    if(allTasks.length > maxShow){
      moreHTML = ' <span class="more-badge" onclick="event.stopPropagation();openSidebar(\''+dateStr+'\')">+'+(allTasks.length-maxShow)+'</span>';
    }
    gridHTML += '<div class="'+classes.join(' ')+'" data-date="'+dateStr+'" onclick="if(event.ctrlKey||event.metaKey){event.stopPropagation();openAddModal(\''+dateStr+'\');}else{openSidebar(\''+dateStr+'\');}">';
    gridHTML += '<div class="date-num">'+displayDay+moreHTML+'</div>';
    gridHTML += taskHTML;
    gridHTML += '</div>';
  }
  document.getElementById('calendarGrid').innerHTML = gridHTML;
}

var sidebarDate = null;

function openSidebar(dateStr){
  sidebarDate = dateStr; selectedDate = dateStr;
  document.querySelectorAll('.cell.selected').forEach(function(el){ el.classList.remove('selected'); });
  var cell = document.querySelector('.cell[data-date="'+dateStr+'"]');
  if(cell) cell.classList.add('selected');

  var parts = dateStr.split('-');
  var y=parseInt(parts[0]), m=parseInt(parts[1]), d=parseInt(parts[2]);
  var dow = new Date(y,m-1,d).getDay();
  var weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('sidebarDate').textContent = m+'月'+d+'日 '+weekdays[dow];

  var dayTasks = [];
  appData.tasks.forEach(function(t){
    if(t.endDate && t.endDate !== t.date){
      if(dateStr >= t.date && dateStr <= t.endDate) dayTasks.push(t);
    } else {
      if(t.date === dateStr) dayTasks.push(t);
    }
  });
  document.getElementById('sidebarAddBtn').setAttribute('data-date', dateStr);

  var html = '';
  if(!dayTasks.length){
    html = '<div class="sidebar-empty">当天暂无任务<br><span style="font-size:.72rem">点击下方按钮添加</span></div>';
  } else {
    dayTasks.forEach(function(t){
      var cat = getCategory(t.category);
      var cls = 'sidebar-task'; if(t.done) cls += ' done';
      html += '<div class="'+cls+'" onclick="openEditModal(\''+t.id+'\')">';
      html += '<div class="sidebar-check" onclick="event.stopPropagation();toggleDone(\''+t.id+'\')">&#10003;</div>';
      html += '<div class="sidebar-task-body">';
      html += '<div class="sidebar-task-title">'+escHtml(t.title)+'</div>';
      html += '<div class="sidebar-task-meta">';
      if(t.time) html += t.time+' ';
      html += '<span class="sidebar-cat-tag" style="background:'+cat.color+'">'+cat.name+'</span> ';
      if(t.endDate && t.endDate!==t.date) html += formatShortDate(t.date)+' - '+formatShortDate(t.endDate)+' ';
      if(t.location) html += '@'+t.location;
      html += '</div></div></div>';
    });
  }
  document.getElementById('sidebarTasks').innerHTML = html;
  document.getElementById('daySidebar').classList.add('open');
  document.getElementById('scrim').classList.add('show');
  document.getElementById('mainWrap').classList.add('dimmed');
}

function closeSidebar(){
  document.getElementById('daySidebar').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
  document.getElementById('mainWrap').classList.remove('dimmed');
  sidebarDate = null; selectedDate = null;
  document.querySelectorAll('.cell.selected').forEach(function(el){ el.classList.remove('selected'); });
}

function openAddModal(dateStr){
  document.getElementById('modalTitle').textContent='添加任务'; document.getElementById('taskId').value='';
  document.getElementById('taskTitle').value=''; document.getElementById('taskDate').value=dateStr||todayStr();
  document.getElementById('taskEndDate').value=''; document.getElementById('taskTime').value='';
  document.getElementById('taskLocation').value=''; document.getElementById('btnDelete').style.display='none';
  renderCatOptions(); document.getElementById('taskModal').style.display='flex'; document.getElementById('taskTitle').focus();
}
function openEditModal(id){
  var t=appData.tasks.find(function(x){return x.id===id;}); if(!t) return;
  document.getElementById('modalTitle').textContent='编辑任务'; document.getElementById('taskId').value=t.id;
  document.getElementById('taskTitle').value=t.title; document.getElementById('taskDate').value=t.date;
  document.getElementById('taskEndDate').value=t.endDate||''; document.getElementById('taskTime').value=t.time||'';
  document.getElementById('taskLocation').value=t.location||''; document.getElementById('btnDelete').style.display='';
  renderCatOptions(t.category); document.getElementById('taskModal').style.display='flex';
}
function closeModal(){ document.getElementById('taskModal').style.display='none'; }

function saveTask(){
  var id=document.getElementById('taskId').value;
  var title=document.getElementById('taskTitle').value.trim();
  if(!title){ showToast('请输入任务名称'); return; }
  var date=document.getElementById('taskDate').value;
  var endDate=document.getElementById('taskEndDate').value;
  var time=document.getElementById('taskTime').value;
  var category=document.getElementById('taskCategory').value;
  var location=document.getElementById('taskLocation').value.trim();
  if(!date){ showToast('请选择日期'); return; }
  if(endDate && endDate<date){ showToast('结束日期不能早于开始日期'); return; }
  if(endDate===date) endDate='';

  if(id){
    var t=appData.tasks.find(function(x){return x.id===id;});
    if(t){ t.title=title; t.date=date; t.endDate=endDate; t.time=time; t.category=category; t.location=location; }
    showToast('任务已更新');
  } else {
    appData.tasks.push({id:'t'+Date.now(),date:date,endDate:endDate,time:time,title:title,category:category,done:false,location:location});
    showToast('任务已添加'+(endDate?' (跨天:'+formatShortDate(date)+'-'+formatShortDate(endDate)+')':''));
  }
  saveData(); closeModal(); renderCalendar();
  if(sidebarDate) openSidebar(sidebarDate);
}
function deleteTask(){
  if(!confirm('确定删除此任务吗？')) return;
  var delId = document.getElementById('taskId').value;
  appData.tasks=appData.tasks.filter(function(t){return t.id!==delId;});
  saveData(); closeModal(); renderCalendar(); if(sidebarDate) openSidebar(sidebarDate); showToast('任务已删除');
}
function toggleDone(id){
  var t=appData.tasks.find(function(x){return x.id===id;}); if(!t) return;
  t.done=!t.done; saveData(); renderCalendar(); if(sidebarDate) openSidebar(sidebarDate);
}

function addCategory(){
  var colors=['#5b5fc7','#10b981','#f59e0b','#e5484d','#8b5cf6','#ec4899','#06b6d4','#f97316','#6366f1','#84cc16'];

// ===== FILE SYSTEM ACCESS API SYNC =====
var syncFileHandle=null;
async function syncToFile(){
  if(!syncFileHandle) return;
  try{
    var file = await syncFileHandle.getFile();
    var text = await file.text();
    var edStart = text.indexOf("var __ED = ");
    var edEnd = text.indexOf("//^^CODEX_MARKER^^", edStart);
    if(edStart >= 0 && edEnd >= 0){
      var newJson = JSON.stringify(appData);
      var updated = text.slice(0, edStart) + "var __ED = " + newJson + ";" + text.slice(edEnd);
      var w = await syncFileHandle.createWritable();
      await w.write(updated);
      await w.close();
    }
  }catch(e){ console.error("syncToFile failed:", e); }
}
function storeFileHandle(handle){
  return new Promise(function(resolve,reject){
    var req=indexedDB.open("CalendarSyncDB",1);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore("handles");};
    req.onsuccess=function(e){
      var db=e.target.result;
      var tx=db.transaction("handles","readwrite");
      tx.objectStore("handles").put(handle,"syncFile");
      tx.oncomplete=resolve;tx.onerror=reject;
    };
    req.onerror=reject;
  });
}
async function restoreSync(){
  return new Promise(function(resolve){
    var req=indexedDB.open("CalendarSyncDB",1);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore("handles");};
    req.onsuccess=async function(e){
      var db=e.target.result;
      var tx=db.transaction("handles","readonly");
      var getReq=tx.objectStore("handles").get("syncFile");
      getReq.onsuccess=async function(){
        var handle=getReq.result;
        if(!handle){resolve(false);return;}
        try{
          var opts={mode:"readwrite"};
          if(await handle.queryPermission(opts)!=="granted"){
            if(await handle.requestPermission(opts)!=="granted"){resolve(false);return;}
          }
          syncFileHandle=handle;
          var file=await handle.getFile();
          var text=await file.text();
          if(text.trim()){
            var s=text.indexOf("var __ED = ");
            var e=text.indexOf("//^^CODEX_MARKER^^", s);
            if(s>=0&&e>=0){
              var j=text.substring(s+12,e).trim();
              if(j.endsWith(';'))j=j.slice(0,-1);
              var fd=JSON.parse(j);
              if(fd.tasks){__ED=fd;appData=JSON.parse(JSON.stringify(fd));parseAppMonth();renderCalendar();}
            }
          }
          resolve(true);
        }catch(er){
          var delReq=indexedDB.open("CalendarSyncDB",1);
          delReq.onsuccess=function(ev){var d=ev.target.result;var t=d.transaction("handles","readwrite");t.objectStore("handles").delete("syncFile");};
          resolve(false);
        }
      };
      getReq.onerror=function(){resolve(false);};
    };
    req.onerror=function(){resolve(false);};
  });
}
document.addEventListener("visibilitychange",async function(){
  if(document.visibilityState==="visible"&&syncFileHandle){
    try{
      var file=await syncFileHandle.getFile();
      var text=await file.text();
      if(text.trim()){
        var s=text.indexOf("var __ED = ");
        var e=text.indexOf("//^^CODEX_MARKER^^", s);
        if(s>=0&&e>=0){
          var j=text.substring(s+12,e).trim();
          if(j.endsWith(';'))j=j.slice(0,-1);
          var fd=JSON.parse(j);
          if(fd.tasks&&JSON.stringify(fd.tasks)!==JSON.stringify(appData.tasks)){
            __ED=fd;appData=JSON.parse(JSON.stringify(fd));parseAppMonth();renderCalendar();
            if(typeof renderInbox==="function")renderInbox();renderCatLegend();
            if(window.sidebarDate)openSidebar(sidebarDate);
          }
        }
      }
    }catch(er){}
  }
});

      if (id) {
        var t = appData.tasks.find(function(x) { return x.id === id; });
        if (t) { t.title = title; t.date = ''; t.endDate = ''; t.time = ''; t.category = cat; t.location = loc; t.description = desc; }
      } else {
        appData.tasks.push({id: 't' + Date.now(), date: '', endDate: '', time: '', title: title, category: cat, done: false, location: loc, description: desc});
      }
      saveData(); closeModal(); renderCalendar(); renderInbox(); renderCatLegend();

    // Otherwise call v8 save, then attach description

  // ---- SIDEBAR: show descriptions ----

// ===== AI SMART ADD =====
var AI_WORKER = 'https://round-haze-1bd0.sdon90909.workers.dev/';
var _aiParsedTask = null;

function openAiModal(){
  document.getElementById('aiModal').style.display = 'flex';
  document.getElementById('aiInput').focus();
  document.getElementById('aiPreview').classList.remove('show');
  document.getElementById('aiConfirmBtn').style.display = 'none';

  _aiParsedTasks = null;
}
function closeAiModal(){
  document.getElementById('aiModal').style.display = 'none';

async function parseAiInput(){
  var input = document.getElementById('aiInput').value.trim();
  if(!input) return;

  var loading = document.getElementById('aiLoading');
  var preview = document.getElementById('aiPreview');
  var confirmBtn = document.getElementById('aiConfirmBtn');
  
  loading.classList.add('show');
  preview.classList.remove('show');
  confirmBtn.style.display = 'none';
  _aiParsedTask = null;

  try{
    var today = todayStr();
    var prompt = '今天的日期是 ' + today + '。请解析以下日程描述，返回 JSON：' + input;
    
    var resp = await fetch(AI_WORKER, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: prompt})
    });
    
    var result = await resp.json();
    loading.classList.remove('show');
    
    // Extract JSON from DeepSeek response
    var msgContent = result.choices && result.choices[0] && result.choices[0].message 
      ? result.choices[0].message.content : '';
    
    if(!msgContent){
      preview.innerHTML = '<div style="color:var(--danger)">AI 未返回结果，请重试</div>';
      preview.classList.add('show');
      return;
    }
    
    // Clean up: remove markdown code fences if present
    msgContent = msgContent.replace('```json','').replace('```','').trim();
    var parsed = JSON.parse(msgContent);
    
    // Normalize to array
    var taskList = Array.isArray(parsed) ? parsed : [parsed];
    
    var catMap = {'工作':'cat_work','个人':'cat_personal','学习':'cat_study','重要':'cat_important'};
    
    _aiParsedTasks = [];
    var html = '';
    for(var i = 0; i < taskList.length; i++){
      var t = taskList[i];
      var catName = t.category || '工作';
      var catId = catMap[catName] || 'cat_work';
      var cat = getCategory(catId) || appData.categories[0];
      
      var task = {
        date: t.date || '',
        endDate: t.endDate || '',
        time: t.time || '',
        title: t.title || ('任务' + (i+1)),
        category: catId,
        note: t.note || ''
      };
      _aiParsedTasks.push(task);
      
      var isLast = (i === taskList.length - 1);
      html += '<div class="ai-preview-item" style="padding:8px 0;' + (isLast ? '' : 'border-bottom:1px solid var(--border-light)') + '">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">';
      html += '<span style="font-weight:700;color:var(--accent);min-width:20px">#' + (i+1) + '</span>';
      html += '<span style="font-weight:600">' + escHtml(task.title) + '</span>';
      html += '<span style="font-size:.7rem;color:#fff;background:' + cat.color + ';padding:1px 7px;border-radius:8px">' + catName + '</span>';
      html += '</div>';
      html += '<div style="font-size:.75rem;color:var(--text-muted);padding-left:28px">';
      html += (task.date ? '📅 ' + task.date : '📥 待办') + ' ';
      html += (task.time ? '⏰ ' + task.time + ' ' : '');
      html += (task.endDate ? '→ ' + task.endDate + ' ' : '');
      html += (task.note ? '💬 ' + escHtml(task.note) : '');
      html += '</div></div>';
    }
    
    preview.innerHTML = html;
    preview.classList.add('show');
    confirmBtn.style.display = 'inline-flex';
    confirmBtn.textContent = '✅ 确认添加 (' + taskList.length + '项)';
  }catch(e){
    loading.classList.remove('show');
    preview.innerHTML = '<div style="color:var(--danger)">解析失败：' + e.message + '</div>';
    preview.classList.add('show');
  }
}

function confirmAiTask(){
  var tasks = _aiParsedTasks;
  if(!tasks || !tasks.length) return;
  for(var i = 0; i < tasks.length; i++){
    var t = tasks[i];
    appData.tasks.push({
      id: 't' + Date.now() + '_' + i,
      date: t.date,
      endDate: t.endDate,
      time: t.time,
      title: t.title,
      category: t.category,
      done: false,
      location: '',
      description: t.note || ''
    });
  }
  saveData();
  closeAiModal();
  renderCalendar();
  if(typeof renderInbox === 'function') renderInbox();
  showToast('已添加 ' + tasks.length + ' 项任务');
}
}
